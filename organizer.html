<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bathroom Organizers | ARYAN India</title>
    <meta name="description" content="Explore ARYAN's unbreakable bathroom organizers: 2-in-1, 3-in-1, 4-in-1, and 5-in-1.">
    <link rel="icon" type="image/png" sizes="32x32" href="https://raw.githubusercontent.com/Samayank/Aryan/main/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="https://raw.githubusercontent.com/Samayank/Aryan/main/android-chrome-192x192.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/Samayank/Aryan/main/android-chrome-192x192.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main id="main-content">
        <!-- Breadcrumb -->
        <nav class="breadcrumb" aria-label="Breadcrumb">
            <div class="container">
                <ol class="breadcrumb-list">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="unbreak.html">Accessories</a></li>
                    <li>Bathroom Organizers</li>
                </ol>
            </div>
        </nav>

        <!-- Hero -->
        <section class="hero">
            <div class="container">
                <h1>Bathroom Organizers</h1>
                <p>Choose from our versatile range of unbreakable multi-purpose bathroom organizers.</p>
            </div>
        </section>

        <!-- Products -->
        <section class="product-categories" id="products">
            <div class="container">
                <div class="product-grid" id="product-grid" style="margin-top: 2rem;"></div>
            </div>
        </section>
    </main>

    <script src="cart.js"></script>
    <script src="components.js"></script>
    <script src="script.js"></script>
    <script>
        var organizers = [
            { id: 'u6', name: '2 in 1 Organizer', category: 'holder', image: 'https://raw.githubusercontent.com/Samayank/Aryan/main/2.png', description: 'Versatile 2-in-1 holder for toothbrush and tumbler.', features: ['Unbreakable material', 'Dual functionality', 'Transparent finish'], price: 'Enquire' },
            { id: 'u7', name: '3 in 1 Organizer', category: 'holder', image: 'https://raw.githubusercontent.com/Samayank/Aryan/main/3.png', description: 'Convenient 3-in-1 holder for comprehensive bathroom organization.', features: ['Unbreakable material', 'Triple functionality', 'Transparent finish'], price: 'Enquire' },
            { id: 'u8', name: '4 in 1 Organizer', category: 'holder', image: 'https://raw.githubusercontent.com/Samayank/Aryan/main/4.png', description: 'Spacious 4-in-1 multi-purpose bathroom holder.', features: ['Unbreakable material', 'Maximum utility', 'Transparent finish'], price: 'Enquire' },
            { id: 'u9', name: '5 in 1 Organizer', category: 'holder', image: 'https://raw.githubusercontent.com/Samayank/Aryan/main/5.png', description: 'Ultimate 5-in-1 bathroom organizer and holder set.', features: ['Unbreakable material', 'All-in-one storage', 'Transparent finish'], price: 'Enquire' }
        ];

        function renderOrganizers() {
            var grid = document.getElementById('product-grid');
            if (!grid) return;
            grid.innerHTML = '';
            organizers.forEach(function (product) {
                var card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML =
                    '<div class="product-image"><img src="' + escapeHTML(product.image) + '" alt="' + escapeHTML(product.name) + '" loading="lazy"></div>' +
                    '<div class="product-info">' +
                    '<h3>' + escapeHTML(product.name) + '</h3>' +
                    '<p>' + escapeHTML(product.description) + '</p>' +
                    '<ul class="product-features">' + product.features.map(function (f) { return '<li>' + escapeHTML(f) + '</li>'; }).join('') + '</ul>' +
                    '<div class="product-price">' + escapeHTML(product.price) + '</div>' +
                    '<div class="product-actions">' +
                    '<button class="btn btn-primary add-to-cart-btn" style="width: 100%;">🛒 Add to Cart</button>' +
                    '</div></div>';
                card.querySelector('.add-to-cart-btn').addEventListener('click', function () {
                    var priceNum = Number(String(product.price).replace(/[^\d.]/g, ''));
                    if (isNaN(priceNum)) priceNum = 0;
                    window.aryanCart.addToCart({ 
                        id: product.id, 
                        name: product.name, 
                        image: product.image, 
                        price: priceNum, 
                        quantity: 1, 
                        config: { series: 'Unbreakable Accessories', grade: 'Unbreakable', size: 'Organizer', bowl: 'Accessory' } 
                    });
                    showToast('✓ ' + product.name + ' added to cart!');
                });
                grid.appendChild(card);
            });
        }

        document.addEventListener('DOMContentLoaded', function () {
            initAryanWebsite('unbreakable');
            renderOrganizers();
        });
    </script>
</body>
</html>
